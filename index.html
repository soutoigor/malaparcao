<title>Mal Aparcao — Acordes</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f232c; --text:#f3f5f8;
    --muted:#8b93a3; --accent:#ffcf5c; --chord:#ffffff;
    --repeat:#5b6675; --line:#2b303b; --green:#5fd08a;
    --cell:#222732; --badge:#2b3242;
    --fs:1.55rem;
  }
  body.light{
    --bg:#f6f7f9; --panel:#ffffff; --panel2:#eef1f5; --text:#13161b;
    --muted:#5d6573; --accent:#b8791a; --chord:#0c0e12; --repeat:#9aa3b2;
    --line:#dde2ea; --cell:#f0f3f7; --badge:#e3e8f0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  html,body{margin:0;padding:0;height:100%;-webkit-text-size-adjust:100%;}
  /* nada seleccionable (evita el menú de copiar y selección de acordes en el iPad) */
  body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  .lyrics{-webkit-user-select:text;user-select:text;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
  }
  /* ---------- Top bar ---------- */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:60px;z-index:30;
    background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:.5rem;padding:0 .7rem;
  }
  #topbar .btn{
    background:var(--panel2);color:var(--text);border:none;border-radius:12px;
    padding:.55rem .7rem;font-size:1rem;font-weight:600;cursor:pointer;line-height:1;
    display:flex;align-items:center;gap:.35rem;
  }
  #topbar .btn:active{background:var(--badge);}
  #menuBtn{font-size:1.7rem;min-width:54px;height:46px;justify-content:center;padding:0 .7rem;}
  .topright{margin-left:auto;display:flex;align-items:center;gap:.5rem;}
  .iconbtn{min-width:50px;height:46px;padding:0;justify-content:center;}
  .iconbtn svg{display:block;}
  #songTitleTop{flex:1;min-width:0;}
  #songTitleTop .t{font-size:1.12rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #songTitleTop .a{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .keybadge{
    background:var(--accent);color:#1a1300;border-radius:10px;padding:.35rem .55rem;
    font-weight:900;font-size:1.02rem;min-width:46px;text-align:center;
  }
  .transp{display:flex;align-items:center;gap:.25rem;}
  .transp button{
    width:42px;height:42px;border-radius:11px;border:none;background:var(--panel2);
    color:var(--text);font-size:1.4rem;font-weight:800;cursor:pointer;
  }
  .transp button:active{background:var(--badge);}
  /* ---------- Layout ---------- */
  #wrap{position:fixed;top:60px;left:0;right:0;bottom:0;display:flex;}
  /* ---------- Sidebar ---------- */
  #menu{
    width:300px;background:var(--panel);border-right:1px solid var(--line);
    overflow-y:auto;flex-shrink:0;transition:transform .22s ease;
    -webkit-overflow-scrolling:touch;
  }
  #menu h2{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    padding:1rem 1rem .3rem;margin:0;}
  .song-link{
    display:flex;align-items:center;gap:.6rem;padding:.85rem 1rem;cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .song-link:active{background:var(--panel2);}
  .song-link.active{background:var(--panel2);border-left:4px solid var(--accent);padding-left:calc(1rem - 4px);}
  .song-link .num{color:var(--muted);font-weight:700;font-size:.95rem;width:1.4rem;text-align:right;}
  .song-link .nm{flex:1;font-weight:700;font-size:1.05rem;}
  .song-link .kb{background:var(--badge);color:var(--text);border-radius:8px;padding:.2rem .45rem;font-size:.82rem;font-weight:800;}
  .song-link.todo .nm{color:var(--muted);}
  /* ---------- Content ---------- */
  #content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.1rem 1.3rem 5rem;}
  #songHead{margin:0 0 .4rem;}
  #songHead .h1{font-size:1.7rem;font-weight:900;margin:0;}
  #songHead .meta{color:var(--muted);font-size:1rem;margin-top:.25rem;display:flex;flex-wrap:wrap;gap:.4rem 1rem;}
  #songHead .meta b{color:var(--text);}
  .capo{color:var(--green);font-weight:700;}
  .section{margin-top:1.4rem;}
  .section .sname{
    display:flex;align-items:baseline;gap:.6rem;font-size:1.18rem;font-weight:800;
    color:var(--accent);border-bottom:2px solid var(--line);padding-bottom:.3rem;margin-bottom:.6rem;
  }
  .section .rep{font-size:.92rem;color:var(--muted);font-weight:700;}
  .section .rep.count{color:var(--accent);}
  .bars{display:flex;flex-wrap:wrap;gap:.5rem;}
  .bar{
    background:var(--cell);border-radius:12px;min-width:84px;flex:0 0 auto;
    padding:.6rem .2rem;text-align:center;font-weight:800;font-size:var(--fs);
    color:var(--chord);letter-spacing:.01em;
  }
  .bar.rep{color:var(--repeat);font-weight:700;}
  .bar sup{font-size:.62em;font-weight:800;}
  .snote{color:var(--muted);font-size:.9rem;margin:-.2rem 0 .6rem;}
  .ord{display:inline-flex;align-items:center;justify-content:center;min-width:1.5rem;height:1.5rem;
    background:var(--accent);color:#1a1300;border-radius:50%;font-size:.85rem;font-weight:900;margin-right:.5rem;}
  .part{margin:.5rem 0 .7rem;}
  .plabel{font-size:.95rem;font-weight:800;color:var(--text);margin-bottom:.35rem;
    display:inline-block;background:var(--badge);border-radius:8px;padding:.2rem .55rem;}
  .brand{display:flex;align-items:center;gap:.65rem;padding:1rem 1rem .5rem;border-bottom:1px solid var(--line);}
  .brandlogo{width:48px;height:48px;flex:0 0 auto;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
  .brandname{font-weight:900;font-size:1.18rem;line-height:1;letter-spacing:.01em;}
  .brandname span{display:block;font-size:.6rem;letter-spacing:.32em;color:var(--accent);font-weight:800;margin-top:.2rem;}
  .lyrics{white-space:pre-wrap;font-family:inherit;font-size:1.15rem;line-height:1.62;margin:.4rem 0;color:var(--text);}
  .todo-box{background:var(--panel);border:1px dashed var(--accent);border-radius:14px;padding:1.2rem;margin-top:1rem;color:var(--text);line-height:1.6;}
  #overlay{display:none;position:fixed;inset:60px 0 0 0;background:rgba(0,0,0,.5);z-index:19;}
  /* barra lateral colapsable (vista completa) */
  body.nav-hidden #menu{display:none;}
  @media (max-width:820px){
    #menu{position:fixed;top:60px;bottom:0;left:0;z-index:20;width:280px;transition:transform .2s ease;box-shadow:0 0 30px rgba(0,0,0,.4);}
    body.nav-hidden #menu{display:block;transform:translateX(-100%);}
    body:not(.nav-hidden) #menu{transform:translateX(0);}
    body:not(.nav-hidden) #overlay{display:block;}
  }
  .fsbtns{display:flex;gap:.25rem;}
  /* ajustes flotantes (abajo derecha) */
  #settings{position:fixed;right:16px;bottom:18px;z-index:26;display:flex;flex-direction:column;align-items:flex-end;gap:.5rem;}
  #gearBtn{width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--text);
    cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;}
  #gearBtn svg{display:block;}
  #gearBtn:active{filter:brightness(.9);}
  #settingsPanel{display:none;flex-direction:column;gap:.4rem;min-width:180px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:.5rem;box-shadow:0 10px 28px rgba(0,0,0,.45);}
  body.settings-open #settingsPanel{display:flex;}
  #settingsPanel .btn{justify-content:flex-start;font-size:1.05rem;padding:.7rem .85rem;width:100%;
    background:var(--panel2);color:var(--text);border:none;border-radius:10px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:.4rem;line-height:1;}
  #settingsPanel .btn:active{background:var(--badge);}
  #settingsPanel .setrow .fsbtns{display:grid;grid-template-columns:42px 3rem 42px;align-items:center;justify-items:center;gap:.4rem;}
  #settingsPanel .setrow .fsbtns .btn{width:42px;height:42px;flex:0 0 auto;padding:0;justify-content:center;font-size:1.05rem;}
  /* botón pequeño de play/pausa, debajo del ⚙ */
  #playBtn{width:56px;height:56px;border-radius:50%;border:none;background:var(--accent);color:#1a1300;
    font-size:1.4rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;}
  #playBtn:active{filter:brightness(.9);}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:.7rem;padding:.2rem .35rem;}
  .setrow .setlbl{font-size:.95rem;color:var(--muted);font-weight:700;}
  .setrow .spd{text-align:center;font-weight:800;color:var(--text);}
  #settingsPanel .setrow{width:100%;}
  @media (max-width:560px){
    #songTitleTop{display:none;}
    #topbar{gap:.35rem;padding:0 .45rem;}
    #topbar .btn{padding:.5rem .55rem;}

/* ============================================================
   Motor de transposición
   ============================================================ */
const SCALE = ["C","C#","D","Eb","E","F","F#","G","G#","A","Bb","B"];
const NOTE_IDX = {"C":0,"C#":1,"DB":1,"D":2,"D#":3,"EB":3,"E":4,"FB":4,"F":5,"E#":5,
  "F#":6,"GB":6,"G":7,"G#":8,"AB":8,"A":9,"A#":10,"BB":10,"B":11,"CB":11};

function transposeChord(chord, steps){
  if(chord==="%" || chord==="" ) return chord;
  if(steps%12===0) return chord;   // tono por defecto: conserva la grafía original (E#°, etc.)
  // separa raíz y sufijo
  const m = chord.match(/^([A-G][#b]?)(.*)$/);
  if(!m) return chord;
  let root = m[1], suffix = m[2];
  let idx = NOTE_IDX[root.toUpperCase()];
  if(idx===undefined) return chord;
  let ni = (idx + steps) % 12; if(ni<0) ni+=12;
  let newRoot = SCALE[ni];
  // maneja bajo invertido tipo C/G
  let slash = "";
  const sl = suffix.match(/\/([A-G][#b]?)(.*)$/);
  if(sl){
    let bIdx = NOTE_IDX[sl[1].toUpperCase()];
    if(bIdx!==undefined){
      let nb=(bIdx+steps)%12; if(nb<0)nb+=12;
      slash = "/"+SCALE[nb]+(sl[2]||"");
      suffix = suffix.slice(0, suffix.indexOf("/"));
    }
  }
  return newRoot + suffix + slash;
}

function transposeKey(key, steps){
  if(!key) return key;
  const minor = key.endsWith("m") && !key.endsWith("dim");
  const base = minor ? key.slice(0,-1) : key;
  return transposeChord(base, steps) + (minor?"m":"");
}

/* superíndice para 7, m7, maj7, etc. */
function prettyChord(c){
  if(c==="%") return "<span>&#37;</span>"; // signo de repetición
  let bass = "";
  const si = c.indexOf("/");
  if(si>=0){ bass = "/"+c.slice(si+1); c = c.slice(0,si); }
  const out = c.replace(/^([A-G][#b]?)(m?)(.*)$/, (all,root,min,rest)=>
    root + min + (rest ? "<sup>"+rest+"</sup>" : ""));
  return out + bass;
}

function repeatCount(rep){
  if(!rep) return 1;
  const m = rep.match(/x\s*(\d+)/i);
  return m ? parseInt(m[1],10) : 1;

  expand:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>',
  compact:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"/></svg>'
};
function updIcons(){
  $("#lyricsBtn").innerHTML = showLyrics ? ICONS.acordes : ICONS.letra;
  $("#lyricsBtn").title = showLyrics ? "Ver acordes" : "Ver letra";
  $("#expandBtn").innerHTML = expanded ? ICONS.compact : ICONS.expand;
  $("#expandBtn").title = expanded ? "Compactar secciones" : "Expandir secciones";
}

function buildMenu(){
  const list = $("#songList");
  list.innerHTML = "";
  SONGS.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "song-link"+(s.todo?" todo":"");
    div.dataset.i = i;
    div.innerHTML = `<span class="num">${i+1}</span>
      <span class="nm">${s.title}</span>
      <span class="kb">${s.key ? transposeKey(s.key, s.defaultOffset||0) : "?"}</span>`;
    div.onclick = ()=>{ selectSong(i); closeMenu(); };
    list.appendChild(div);
  });
}

function selectSong(i){
  if(typeof stopScroll==="function") stopScroll();
  current = i; offset = SONGS[i].defaultOffset || 0;
  render();
  document.querySelectorAll(".song-link").forEach(el=>{
    el.classList.toggle("active", +el.dataset.i===i);
  });
  $("#content").scrollTop = 0;
}

/* Orden de interpretación de cada canción (aproximado, basado en Cifraclub).
   Se usa en la vista "Expandir". Los nombres deben coincidir con las secciones. */
const FLOWS = {
  "mi-nombre":["Verso 1","Verso 2 (→ Coro)","Coro","Verso 2 (→ Coro)","Coro","Puente","Coro"],
  "el-fin-del-mundo":["Verso","Verso","Coro","Verso","Verso","Coro final (→ Puente)","Puente","Outro"],
  "inmortal":["Intro","Verso","Verso","Pre-Coro","Coro","Verso","Pre-Coro","Coro (→ final)","Coro final (modula a D)"],
  "peter-pan":["Intro","Verso","Pre-Coro","Coro","Post-Coro","Verso","Pre-Coro","Coro","Instrumental","Coro","Post-Coro","Outro"],
  "cuando-tu-vas":["Verso 1","Verso 2","Pre-Coro","Coro","Pre-Coro","Coro","Cierre"],
  "marta-sebas-guille":["Intro","Verso","Verso","Coro","Verso 2","Coro","Puente","Coro","Coro","Outro"],
  "sobre-un-vidrio-mojado":["Intro","Verso","Estribillo","Verso","Estribillo","Puente","Verso","Final"],
  "me-has-invitado-a-bailar":["Verso","Estribillo","Verso 2","Estribillo","Coda","Estribillo","Coda"],
  "zapatillas":["Intro","Verso","Pre-Coro","Coro","Verso 2","Pre-Coro","Coro","Puente","Coro"],
  "que-te-queria":["Intro","Verso 1","Coro","Verso 2","Coro final","Interludio","Cierre"],
  "desde-que-ya-no-eres-mia":["Intro","Verso","Verso","Coro","Verso","Coro","Coro"],
  "carolina":["Intro","Verso 1","Pre-Estribillo","Estribillo","Solo 1","Verso 2","Pre-Estribillo","Estribillo","Solo 2","Pre-Estribillo","Estribillo","Estribillo","Final"],
  "potra-salvaje":["Intro","Verso","Pre-Estribillo","Estribillo","Verso 2","Pre-Estribillo","Estribillo","Interludio","Puente","Estribillo"],
  "voy-a-pasarmelo-bien":["Verso","Verso","Verso","Puente hablado","Solo","Verso","Verso","Outro"],
  "antes-de-que-cuente-diez":["Intro","Verso","Interludio","Pre-Coro","Puente","“Lo que me llevará…”","Coro","Solo 1 (medio)","Verso","Coro","Solo 2 (final)"]
};

function renderBars(bars){
  let prevReal = null;
  return bars.map(b=>{
    if(b==="%"){
      return `<div class="bar rep" title="repetir compás (${prevReal||""})">&#37;</div>`;
    }
    const t = transposeChord(b, offset);
    prevReal = t;
    return `<div class="bar">${prettyChord(t)}</div>`;
  }).join("");
}

function render(){
  const s = SONGS[current];
  $("#songTitleTop .t").textContent = s.title;
  $("#songTitleTop .a").textContent = s.artist;

  const head = $("#songHead");
  const sec = $("#sections");

  if(s.todo){
    $("#keyBadge").textContent = s.key || "?";
    head.innerHTML = `<div class="h1">${s.title}</div>
      <div class="meta">${s.artist?("<b>"+s.artist+"</b>"):""} ${s.key?("· Tono: "+s.key):""}</div>`;
    sec.innerHTML = `<div class="todo-box">
      <b>Tab pendiente.</b><br>
      Envíame el tab (foto o PDF) de esta canción y la añado al setlist con su estructura, acordes y compases${s.key?(" en "+s.key):""}.
    </div>`;
    return;
  }

  const dispKey = transposeKey(s.key, offset);
  $("#keyBadge").textContent = dispKey;

  let metaParts = [`<span><b>Tono:</b> ${dispKey}</span>`];
  if(s.capo) metaParts.push(`<span class="capo">Cejilla ${transposeCapoNote(s)}</span>`);
  const relOff = offset - (s.defaultOffset||0);
  if(relOff!==0) metaParts.push(`<span>(${relOff>0?"+":""}${relOff} ½ tono)</span>`);
  if(s.origin) metaParts.push(`<span>${s.origin}</span>`);

  head.innerHTML = `<div class="h1">${s.title}</div>
    <div class="meta"><b>${s.artist}</b> ${metaParts.join(" ")}</div>`;

  sec.innerHTML = "";

  // vista de Letra
  if(showLyrics){
    const lyr = (s.lyrics || "").trim();
    sec.innerHTML = lyr
      ? `<div class="lyrics">${lyr.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>`
      : `<div class="todo-box"><b>Letra no añadida.</b><br>Pega la letra de esta canción en su campo <code>lyrics</code> dentro del archivo y aparecerá aquí.</div>`;
    sec.appendChild(buildSongNav());
    return;
  }

  // construir la secuencia de secciones a mostrar
  let sequence = [];
  const flow = FLOWS[s.id];
  if(expanded && flow){
    flow.forEach(nm=>{ const f = s.sections.find(x=>x.name===nm); if(f) sequence.push(f); });
  } else if(expanded){
    s.sections.forEach(sec0=>{ const n=repeatCount(sec0.rep); for(let i=0;i<n;i++) sequence.push(sec0); });
  } else {
    sequence = s.sections.slice();
  }

  // cuántas veces suena cada sección en la canción (según el recorrido)
  const playCount = {};
  (FLOWS[s.id]||[]).forEach(n=> playCount[n]=(playCount[n]||0)+1);

  sequence.forEach((section,idx)=>{
    const wrap = document.createElement("div");
    wrap.className = "section";
    const ord = expanded ? `<span class="ord">${idx+1}</span>` : "";
    const cnt = playCount[section.name];
    const countTag = (cnt>1) ? `<span class="rep count">suena ${cnt}×</span>` : "";
    const repTag = section.rep ? `<span class="rep">${section.rep}</span>` : "";
    let inner = `<div class="sname">${ord}${section.name} ${countTag}${repTag}</div>`;
    if(section.note){ inner += `<div class="snote">${section.note}</div>`; }
    if(section.parts){
      // sección partida en mitades (p.ej. solo: mitad guitarra / mitad sax)
      section.parts.forEach(p=>{
        inner += `<div class="part">
            <div class="plabel">${p.label}</div>
            <div class="bars">${renderBars(p.bars)}</div>
          </div>`;
      });
    } else {
      inner += `<div class="bars">${renderBars(section.bars)}</div>`;
    }
    wrap.innerHTML = inner;
    sec.appendChild(wrap);
  });

  sec.appendChild(buildSongNav());
}

/* botones anterior / siguiente al final de la canción */
function buildSongNav(){
  const nav = document.createElement("div");
  nav.className = "songnav";
  const prev = SONGS[current-1], next = SONGS[current+1];
  const prevBtn = prev
    ? `<button class="prev" onclick="selectSong(${current-1})"><span class="lbl">◀ Anterior</span><span class="ttl">${prev.title}</span></button>`
    : `<button class="prev" disabled><span class="lbl">◀ Anterior</span><span class="ttl">—</span></button>`;
  const nextBtn = next
    ? `<button class="next" onclick="selectSong(${current+1})"><span class="lbl">Siguiente ▶</span><span class="ttl">${next.title}</span></button>`
    : `<button class="next" disabled><span class="lbl">Siguiente ▶</span><span class="ttl">—</span></button>`;
  nav.innerHTML = prevBtn + nextBtn;
  return nav;
}

/* la cejilla se mueve con la transposición */
function transposeCapoNote(s){
  let capo = parseInt(s.capo,10) - offset;
  if(capo<0) capo = 0;
  return capo;
}

function applyFont(){
  const base = 1.55 + fontStep*0.16;
  document.documentElement.style.setProperty("--fs", base+"rem");
}

/* ---------- eventos ---------- */
$("#trUp").onclick = ()=>{ offset++; render(); };
$("#trDown").onclick = ()=>{ offset--; render(); };
$("#fsUp").onclick = ()=>{ fontStep=Math.min(fontStep+1,5); applyFont(); };
$("#fsDown").onclick = ()=>{ fontStep=Math.max(fontStep-1,-2); applyFont(); };
$("#themeBtn").onclick = ()=>{ document.body.classList.toggle("light"); };
$("#printBtn").onclick = ()=>{ stopScroll(); window.print(); };
$("#lyricsBtn").onclick = ()=>{ showLyrics = !showLyrics; updIcons(); render(); };
$("#expandBtn").onclick = ()=>{ expanded = !expanded; updIcons(); render(); };
$("#gearBtn").onclick = (e)=>{ e.stopPropagation(); document.body.classList.toggle("settings-open"); };
document.addEventListener("click", (e)=>{
  if(document.body.classList.contains("settings-open") && !e.target.closest("#settings"))
    document.body.classList.remove("settings-open");
});
$("#menuBtn").onclick = ()=>{ document.body.classList.toggle("nav-hidden"); };
$("#overlay").onclick = closeMenu;
function closeMenu(){ if(window.innerWidth<=820) document.body.classList.add("nav-hidden"); }

/* ---------- auto-scroll ---------- */
const SPEEDS=[0.5,1,1.5,2,3];
let spdIdx=1, scrolling=false, rafId=null, lastTs=0, accum=0;
function scrollStep(ts){
  if(!scrolling) return;
  if(!lastTs) lastTs=ts;
  const dt=ts-lastTs; lastTs=ts;
  accum += SPEEDS[spdIdx]*0.035*dt;
  if(accum>=1){
    const px=Math.floor(accum); accum-=px;
    const c=$("#content"), before=c.scrollTop;
    c.scrollTop += px;
    if(c.scrollTop===before){ stopScroll(); return; }
  }
  rafId=requestAnimationFrame(scrollStep);
}
function startScroll(){ scrolling=true; lastTs=0; accum=0; $("#playBtn").textContent="⏸"; rafId=requestAnimationFrame(scrollStep); }
function stopScroll(){ scrolling=false; if(rafId)cancelAnimationFrame(rafId); $("#playBtn").textContent="▶"; }
$("#playBtn").onclick = ()=>{ scrolling ? stopScroll() : startScroll(); };
$("#spdUp").onclick   = ()=>{ spdIdx=Math.min(spdIdx+1,SPEEDS.length-1); $("#spdVal").textContent=SPEEDS[spdIdx]+"×"; };
$("#spdDown").onclick = ()=>{ spdIdx=Math.max(spdIdx-1,0); $("#spdVal").textContent=SPEEDS[spdIdx]+"×"; };

/* swipe entre canciones (izq/der) en el área de contenido */
let tsx=0, tsy=0;
$("#content").addEventListener("touchstart",e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;},{passive:true});
$("#content").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(dx)>80 && Math.abs(dx)>Math.abs(dy)*1.8){
    if(dx<0 && current<SONGS.length-1) selectSong(current+1);
    if(dx>0 && current>0) selectSong(current-1);
  }
},{passive:true});

/* ---------- init ---------- */
if(window.innerWidth<=820) document.body.classList.add("nav-hidden");  // móvil: empieza colapsado
buildMenu();
updIcons();
selectSong(0);   // arranca en la 1ª canción del setlist
applyFont();
</script>
</body>
</html>
